services:
  - type: web
    name: prompit-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: >
      npm install -g pnpm@10 &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @prompit/db exec prisma generate &&
      pnpm --filter @prompit/api build
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: FRONTEND_URL
        value: https://prompit-web.vercel.app
      - key: DATABASE_URL
        value: postgresql://postgres:Prompit2024Secure1@db.zxhskwnhmwzkoaklhsxv.supabase.co:5432/postgres
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false
      - key: STRIPE_TEAM_PRICE_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_AI_API_KEY
        sync: false
